<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div id="winner"></div>
    <h1 id="firstheading"><b>TIC TAC TOE</b></h1>
    <h2 id="message"></h2>
    <h2 id="scoreboard">X: 0 | O: 0</h2>
    <div id="d1">
        <div class="box "></div>
        <div class="box "></div>
        <div class="box "></div>
    </div>
    <div id="d2">
        <div class="box "></div>
        <div class="box "></div>
        <div class="box "></div>
    </div>
    <div id="d3">
        <div class="box "></div>
        <div class="box "></div>
        <div class="box "> </div>
    </div>
    <div class="refresh">
        <button id="btn1">New Game</button>
        <button id="btn2">Reset</button>
    </div>
    <script src="script2.js"></script>
</body>
</html>
